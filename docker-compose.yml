services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: docagent
      POSTGRES_USER: docagent
      POSTGRES_PASSWORD: docagent
    ports:
      - "5444:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata:
